name: Build desktop apps

# Builds the Athena Dictate installers (.exe / .dmg / .AppImage) for Windows,
# macOS, and Linux. Triggered manually, or on a version tag (vX.Y.Z) which also
# creates a release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    # Needed for the tagged-release step to create the release and attach assets.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: athena-dictate-windows
            build: pwsh -File build/build-windows.ps1
            installer: dist/Athena Dictate Setup.exe
          - os: macos-latest
            artifact: athena-dictate-macos
            build: bash build/build-macos.sh
            installer: dist/Athena Dictate.dmg
          - os: ubuntu-latest
            artifact: athena-dictate-linux
            build: bash build/build-linux.sh
            installer: dist/Athena Dictate.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup (Windows installer tooling)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libsndfile1 libegl1 libxkbcommon0 libgl1

      - name: Build app and installer
        run: ${{ matrix.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.installer }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.installer }}
