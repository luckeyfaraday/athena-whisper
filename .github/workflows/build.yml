name: Build desktop apps

# Builds the clickable Athena Dictate app for Windows, macOS, and Linux.
# Triggered manually, or on a version tag (vX.Y.Z) which also creates a release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: athena-dictate-windows
            build: pwsh -File build/build-windows.ps1
          - os: macos-latest
            artifact: athena-dictate-macos
            build: bash build/build-macos.sh
          - os: ubuntu-latest
            artifact: athena-dictate-linux
            build: bash build/build-linux.sh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libsndfile1 libegl1 libxkbcommon0 libgl1

      - name: Build app
        run: ${{ matrix.build }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/Athena Dictate" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/Athena Dictate.app" "${{ matrix.artifact }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -C dist -czf "${{ matrix.artifact }}.tar.gz" "Athena Dictate"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
